server.port=8082
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/microservice-project

# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true

# ===== ROUTES DOCS EN PREMIER =====
spring.cloud.gateway.server.webflux.routes[0].id=PARTNERSERVICE-DOCS
spring.cloud.gateway.server.webflux.routes[0].uri=lb://PARTNERSERVICE
