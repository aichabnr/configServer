server:
  port: 8089

spring:
  datasource:
    # Dockerized MySQL is published on host port 3307 (root/root); reviewdb is auto-created
    url: "jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/reviewdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/microservice-project}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8180/realms/microservice-project/protocol/openid-connect/certs}

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
