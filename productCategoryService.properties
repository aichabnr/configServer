
server.port=8087

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/product_category_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=false
# --- CONFIGURATION JPA / HIBERNATE ---
# 'update' crķe les tables automatiquement si elles n'existent pas
spring.jpa.hibernate.ddl-auto=update
# Spķcifie le dialecte SQL pour PostgreSQL (optionnel mais recommandķ)
# Affiche les requĻtes SQL dans la console (trĶs utile pour le dķveloppement)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/


##swagger
#springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method



